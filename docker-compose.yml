services:
  mongodb:
    image: mongo:7
    container_name: sindhu-mongodb
    # user: ${CURRENT_UID:-1000}:${CURRENT_GID:-1000}
    volumes:
      - ../deployment/sindhu/mongodb/data/db:/data/db
      - /etc/localtime:/etc/localtime:ro
    restart: always
    ports:
      - 27017:27017
    networks:
      - default
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis/redis-stack-server
    container_name: sindhu-redis
    # user: ${CURRENT_UID:-1000}:${CURRENT_GID:-1000}
    volumes:
      - ../deployment/sindhu/redis/data:/data
    restart: always
    ports:
      - 6379:6379
      - 8001:8001
    networks:
      - default
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  mageai:
    image: mageai-sindhu-image
    command: mage start ${PROJECT_NAME}
    # user: ${CURRENT_UID:-1000}:${CURRENT_GID:-1000}
    env_file:
      - .env.dev
    build:
      context: mageai
      dockerfile: Dockerfile
    environment:
      USER_CODE_PATH: /home/src/${PROJECT_NAME}
      ENV: ${ENV:-dev}
      REQUIRE_USER_AUTHENTICATION: 1 # Sign-in required 
      MAGE_ACCESS_TOKEN_EXPIRY_TIME: 86400 # 24 hrs.
    ports:
      - 6789:6789
    volumes:
      - ../deployment/sindhu/mageai:/home/src/
      - ./sindhu/models/:/home/src/${PROJECT_NAME}/models
      - ./sindhu/schemas/:/home/src/${PROJECT_NAME}/schemas
      - ./sindhu/services/:/home/src/${PROJECT_NAME}/services
      - ../sindhu/credentials/:/home/src/${PROJECT_NAME}/credentials
      - ./sindhu/web/static/resources:/home/src/${PROJECT_NAME}/web/static/resources
      - ./sindhu/web/static/forecast_models:/home/src/${PROJECT_NAME}/web/static/forecat_models
      - /etc/localtime:/etc/localtime:ro

    restart: on-failure:5
    links:
      - mongodb
      - redis
      - api
    depends_on:
      - mongodb
      - redis
      - api

    # user: "1000:1000"

    networks:
      - default

    logging:
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build: .
    image: sindhu/sindhu:latest
    container_name: sindhu-web
    # user: ${CURRENT_UID:-1000}:${CURRENT_GID:-1000}
    volumes:
      - .:/app
      - ../deployment:/deployment
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8080:8080
    links:
      - mongodb
      - api
    depends_on:
      - mongodb
      - api
    networks:
      - default
    restart: on-failure:5
    env_file:
      - .env.dev
    environment:
      SINDHU_SETTINGS: /app/.env.dev
    command: /app/scripts/run-web-develop-docker
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    image: sindhu/sindhu:latest
    container_name: sindhu-api
    # user: ${CURRENT_UID:-1000}:${CURRENT_GID:-1000}
    volumes:
      - .:/app
      - ../deployment:/deployment
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8000:8000
    links:
      - mongodb
    depends_on:
      - mongodb
    networks:
      - default
    restart: on-failure:5
    environment:
      - APP_ENV:"dev"
    env_file:
      - .env.dev
    command: /app/scripts/run-api-develop-docker

    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
