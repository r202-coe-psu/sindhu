{% extends '/base/default_page.html' %}

{% block content %}
<div>
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
        <div class="relative" style="height: 550px;">

        <div id="loading_map"
            class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-gray-50/80 backdrop-blur-sm transition-opacity duration-300">
            <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <span class="mt-3 text-sm font-medium text-gray-600 animate-pulse">Loading map..</span>
            </div>
        </div>

        <div id="mapid" style="z-index:1; height: 550px; width:100%;"></div>
        </div>
    </div>
</div>


<script type="text/javascript">
  window.onload = function () {
    if (!window.brython_initialized) {
      brython();
      window.brython_initialized = true;
    }
  };

</script>
<script type="text/python">
  from monitors import BaseMonitor
  from browser import aio
  map = BaseMonitor(
    "{{ g.lang_code }}",
    "{{ api_url }}",
    )
  map.start()
</script>
{% endblock content %}
