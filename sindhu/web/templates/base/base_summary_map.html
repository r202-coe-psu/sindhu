<!doctype html>
<html>

<head>
    <style>
        #mapid {
            background-color: white;
        }

        .info {
            padding: 6px 8px;
            font: 24px/26px Arial, Helvetica, sans-serif;
            background: white;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        .tooltip-marker {
            font-size: medium;
            border: 2px solid;
        }

        .leaflet-tooltip-top.tooltip-marker::before,
        .leaflet-tooltip-bottom.tooltip-marker::before,
        .leaflet-tooltip-left.tooltip-marker::before,
        .leaflet-tooltip-right.tooltip-marker::before {
            border: none !important;
        }

        .info h4 {
            font: 22px Arial;
            text-align: end;
            margin: 0 0 5px;
            color: #777;
        }

        .province_popup {
            width: 180px;
        }

        .province_popup .leaflet-popup-tip {
            width: 0px;
            height: 0px;
        }
    </style>
    {% include 'base/map_header.html' %}
</head>

<body>
    <div class="ui very wide sidebar vertical menu">
        <div class="item">
            <span style="font-size: 24px">{{ config['APP_TITLE'] }}</span>
        </div>
        <div class="ui white big right attached fixed fluid button" name="slide_button">
            <i class="arrow left icon"></i>
            <span class="text">{{ _('Menu') }}</span>
        </div>

        <div id="panel-top"></div>
        <div id="panel">
            <div class="item">
                <div class="ui toggle checkbox">
                    <input type="checkbox" id="dust_sensor">
                    <label style="font-size: 1.3rem;font-weight: bold;">{{ _('Dust sensor') }}</label>
                </div>
            </div>
            <div class="item">
                <div class="ui toggle checkbox">
                    <input type="checkbox" id="dust_summary">
                    <label style="font-size: 1.3rem;font-weight: bold;">{{ _('Dust estimation') }}</label>
                </div>
            </div>
        </div>
        <div id="panel-bottom"></div>

    </div>
    <div class="pusher" style="width: 100%;height: 100%;padding: 0;">
        {% block body %}{% endblock %}
    </div>
</body>
<script>
    $('.ui.sidebar').sidebar({
        dimPage: false,
        closable: false,
    }).sidebar('setting', 'transition', 'overlay')
        .sidebar('setting', 'mobileTransition', 'overlay')
        .sidebar('show');

    $("div[name='slide_button']").click(function () {
        // alert("Handler for .click() called.");
        $('.ui.sidebar')
            .sidebar('toggle')
            ;
        $("div[name='slide_button']")
            .transition('pulse')
            ;

    });

</script>
{% block additional_js %}{% endblock %}

</html>
